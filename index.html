<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginJS-DPK2</title>
    <style>
        body {
            background-color: #fdf0f6; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 25px;
            border: 4px dashed #ffb7ce;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            color: #ff85a2;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            color: #9b9b9b;
            font-size: 14px;
            margin-bottom: 5px;
            margin-left: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2f0fb; 
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffb7ce;
        }

        button {
            background-color: #b2e2f2; 
            color: #555;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #9ad4e6;
            transform: scale(1.05);
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        #success-container {
            display: none; /* ini agar hanya muncul saat user klik btn submit */
            border-color: #b2e2f2;
        }
    </style>
</head>
<body>

    <div id="login-box" class="login-container">
        <h2>Selamat Datang!</h2>
        
        <div class="input-group">
            <label>Nama Pengguna</label>
            <input type="text" id="username" placeholder="Masukkan nama pengguna...">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password...">
        </div>

        <button onclick="cekLogin()">Submit</button>
        <p id="message"></p>
    </div>

    <div id="success-container" class="login-container">
        <h2>Login Berhasil!</h2>
        <p style="color: #888; font-size: 14px;">Selamat datang kembali, Najma Naeva.</p>
        <button onclick="location.reload()" style="background-color: #ffb7ce; color: white;">Kembali</button>
    </div>

<script>
    function cekLogin() {
        const userIn = document.getElementById('username').value;
        const passIn = document.getElementById('password').value;
        const msg = document.getElementById('message');

        // nama pengguna dan pw ditentukan di sini
        const validUser = "najma naeva";
        const validPass = "najma12345";

        if (userIn === validUser && passIn === validPass) {
             // jika nama pengguna dan pw sesuai maka: berhasil
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('success-container').style.display = 'block';
        } else {
             // jika nama pengguna dan pw tidak sesuai maka: gagal
            msg.innerText = "Login Gagal!";
            msg.style.color = "#ff4d4d";
        }
    }
</script>

</body>
</html>
